apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: default
spec:
  selector:
    app: demo-app
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-canary
  namespace: default
spec:
  selector:
    app: demo-app
  ports:
    - port: 80
      targetPort: 3000
