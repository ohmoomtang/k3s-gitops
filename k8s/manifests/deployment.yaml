apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-app
  namespace: default
spec:
  replicas: 5
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: ghcr.io/ohmoomtang/k3s-gitops:80816fde6fd4038bb427d141d692e8bd99b39d8c
          ports:
            - containerPort: 3000
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: 'http://tempo.monitoring:4318/v1/traces'
  strategy:
    canary:
      canaryService: demo-app-canary
      stableService: demo-app
      trafficRouting:
        nginx:
          stableIngress: demo-app
      steps:
        - setWeight: 20
        - pause: { duration: 30s }
        - analysis:
            templates:
              - templateName: error-rate
        - setWeight: 50
        - pause: { duration: 30s }
        - analysis:
            templates:
              - templateName: error-rate
        - setWeight: 100
