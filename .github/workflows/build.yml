name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Lint
        run: npm run lint
        working-directory: app

      - name: Test
        run: npm run test
        working-directory: app

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ghcr.io/ohmoomtang/k3s-gitops:latest
            ghcr.io/ohmoomtang/k3s-gitops:${{ github.sha }}

      - name: Run Trivy CVE scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/ohmoomtang/k3s-gitops:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
